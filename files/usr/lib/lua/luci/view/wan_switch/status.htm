<script type="text/javascript">//<![CDATA[
	var switchUrl = '<%=luci.dispatcher.build_url("admin", "services", "wan_switch", "switch")%>';
	var statusUrl = '<%=luci.dispatcher.build_url("admin", "services", "wan_switch", "status")%>';

	function byId(id) {
		return document.getElementById(id);
	}

	function setValueField(name, html) {
		var row = byId('cbi-wan_switch-1-' + name);
		var fields;

		if (row) {
			fields = row.getElementsByClassName('cbi-value-field');
			if (fields && fields.length > 0) {
				fields[0].innerHTML = html;
				return;
			}
		}

		var elem = byId('cbid.wan_switch.1.' + name);
		if (elem)
			elem.innerHTML = html;
	}

	function policyName(policy) {
		if (policy === 'campus_only')
			return '校园 WAN 单线';
		if (policy === 'usb_only')
			return 'USB 随身 WiFi 单线';
		if (policy === 'campus_first')
			return '校园 WAN 优先（兼容旧配置）';
		if (policy === 'usb_first' || policy === 'f50_first')
			return 'USB 优先（兼容旧配置）';
		return policy || '未知';
	}

	function onlineLabel(online, ip) {
		var cls = online ? 'wan-switch-ok' : 'wan-switch-bad';
		var text = online ? '在线' : '离线';
		if (ip)
			text += ' · ' + ip;
		return '<span class="' + cls + '">' + text + '</span>';
	}

	function billingLabel(data) {
		if (data.mode === 'usb')
			return '<span class="wan-switch-warn">当前正在使用 USB 计费网络</span>';
		if (data.usb_online)
			return '<span class="wan-switch-warn">USB 已在线，计费保护未关闭接口</span>';
		if (data.billing_protection)
			return '<span class="wan-switch-ok">已启用，白天不走 USB</span>';
		return '<span class="wan-switch-bad">未完全启用，请检查 mwan3.usb</span>';
	}

	function workdayLabel(value) {
		if (value === 'yes')
			return '工作日';
		if (value === 'no')
			return '非工作日';
		return '未知';
	}

	function setText(id, value) {
		var elem = byId(id);
		if (elem)
			elem.textContent = value || '';
	}

	function setDashboardClass(level) {
		var elem = byId('wan-switch-dashboard');
		if (!elem)
			return;

		elem.className = 'wan-switch-dashboard wan-switch-' + (level || 'info');
	}

	function updateDashboard(data) {
		var usingUsb = data.mode === 'usb' || (data.usb_dev && data.default_dev === data.usb_dev);
		var exitIp = usingUsb ? data.usb_ip : data.wan_ip;
		var usbLine = (data.usb_online ? 'USB 在线' : 'USB 离线') + (data.usb_ip ? ' · ' + data.usb_ip : '');
		var protectionText = usingUsb ? '已关闭' : (data.billing_protection ? '计费保护中' : (data.usb_online ? 'USB 已在线' : '需检查'));

		setDashboardClass(data.level);
		setText('wan-switch-headline', data.headline);
		setText('wan-switch-subtitle', data.now + ' · ' + data.window_label);
		setText('wan-switch-current-exit', data.current_exit);
		setText('wan-switch-current-ip', exitIp || '无 IP');
		setText('wan-switch-outage-tonight', data.outage_tonight ? '会' : '不会');
		setText('wan-switch-outage-detail', data.outage_tonight ? '明天是工作日：23:25 预热 USB，23:30 切到 USB，次日 08:00 切回校园 WAN' : '明天不是工作日，预计今晚不断网');
		setText('wan-switch-protection', protectionText);
		setText('wan-switch-next-action', data.next_action);
		setText('wan-switch-usb-line', usbLine);
	}

	function updateButtons(data) {
		var campusBtn = byId('cbid.wan_switch.1.switch_to_campus');
		var usbBtn = byId('cbid.wan_switch.1.switch_to_usb');

		if (campusBtn)
			campusBtn.disabled = data.mode === 'campus';
		if (usbBtn)
			usbBtn.disabled = data.mode === 'usb';
	}

	function updateStatus(data) {
		if (!data)
			return;

		setValueField('current_policy', policyName(data.policy || data.default_rule));
		setValueField('wan_status', onlineLabel(data.wan_online, data.wan_ip));
		setValueField('usb_status', onlineLabel(data.usb_online, data.usb_ip));
		setValueField('billing_status', billingLabel(data));
		setValueField('workday_status', '今天 ' + workdayLabel(data.today_workday) +
			'；明天 ' + workdayLabel(data.tomorrow_workday));

		updateDashboard(data);
		updateButtons(data);
	}

	function setBusy(busy) {
		var ids = [
			'cbid.wan_switch.1.switch_to_campus',
			'cbid.wan_switch.1.switch_to_usb',
			'cbid.wan_switch.1.switch_auto',
			'cbid.wan_switch.1.login_campus',
			'cbid.wan_switch.1.down_wan',
			'cbid.wan_switch.1.down_usb'
		];

		for (var i = 0; i < ids.length; i++) {
			var elem = byId(ids[i]);
			if (elem)
				elem.disabled = busy;
		}

		var notice = byId('wan-switch-notice');
		if (notice)
			notice.innerHTML = busy ? '执行中...' : '';
	}

	function requestJson(url, params, callback) {
		var xhr = new XMLHttpRequest();
		var query = [];

		if (params) {
			for (var key in params) {
				if (params.hasOwnProperty(key))
					query.push(encodeURIComponent(key) + '=' + encodeURIComponent(params[key]));
			}
		}

		query.push('_=' + new Date().getTime());

		xhr.onreadystatechange = function() {
			if (xhr.readyState !== 4)
				return;

			if (xhr.status >= 200 && xhr.status < 300) {
				try {
					callback(JSON.parse(xhr.responseText));
				}
				catch (e) {
					callback(null);
				}
			}
			else {
				callback(null);
			}
		};

		xhr.open('GET', url + '?' + query.join('&'), true);
		xhr.send(null);
	}

	function refreshStatus() {
		requestJson(statusUrl, null, function(data) {
			updateStatus(data);
		});
	}

	function switchWan(target) {
		setBusy(true);

		requestJson(switchUrl, { target: target }, function(data) {
			setBusy(false);

			var notice = byId('wan-switch-notice');
			if (data && data.success) {
				if (notice)
					notice.innerHTML = data.message || '执行完成';
				updateStatus(data.status);
			}
			else {
				if (notice) {
					var msg = data && data.message ? data.message : '执行失败';
					notice.textContent = msg;
				}
				if (data && data.status)
					updateStatus(data.status);
			}
		});

		return false;
	}

	function bindActionButton(id, target) {
		var btn = byId(id);

		if (!btn)
			return;

		btn.type = 'button';
		btn.onclick = function(ev) {
			if (ev && ev.preventDefault)
				ev.preventDefault();

			return switchWan(target);
		};
	}

	function bindButtons() {
		bindActionButton('cbid.wan_switch.1.switch_to_campus', 'campus');
		bindActionButton('cbid.wan_switch.1.switch_to_usb', 'usb');
		bindActionButton('cbid.wan_switch.1.switch_auto', 'auto');
		bindActionButton('cbid.wan_switch.1.login_campus', 'login');
		bindActionButton('cbid.wan_switch.1.down_wan', 'down-wan');
		bindActionButton('cbid.wan_switch.1.down_usb', 'down-usb');
	}

	function initWanSwitchPage() {
		bindButtons();
		refreshStatus();
		window.setInterval(refreshStatus, 5000);
	}

	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', initWanSwitchPage);
	}
	else {
		initWanSwitchPage();
	}
//]]></script>

<div id="wan-switch-dashboard" class="wan-switch-dashboard wan-switch-info">
	<div class="wan-switch-hero">
		<div>
			<div class="wan-switch-kicker">当前工作状态</div>
			<div id="wan-switch-headline" class="wan-switch-headline">读取中...</div>
			<div id="wan-switch-subtitle" class="wan-switch-subtitle">等待状态接口返回</div>
		</div>
		<div class="wan-switch-badge" id="wan-switch-current-exit">--</div>
	</div>

	<div class="wan-switch-grid">
		<div class="wan-switch-card">
			<div class="wan-switch-card-title">当前出口</div>
			<div id="wan-switch-current-ip" class="wan-switch-card-main">--</div>
		</div>
		<div class="wan-switch-card">
			<div class="wan-switch-card-title">今晚断网</div>
			<div id="wan-switch-outage-tonight" class="wan-switch-card-main">--</div>
			<div id="wan-switch-outage-detail" class="wan-switch-card-note">--</div>
		</div>
		<div class="wan-switch-card">
			<div class="wan-switch-card-title">USB 计费保护</div>
			<div id="wan-switch-protection" class="wan-switch-card-main">--</div>
			<div id="wan-switch-usb-line" class="wan-switch-card-note">--</div>
		</div>
		<div class="wan-switch-card">
			<div class="wan-switch-card-title">下一次自动动作</div>
			<div id="wan-switch-next-action" class="wan-switch-card-main wan-switch-card-action">--</div>
		</div>
	</div>
</div>

<div id="wan-switch-notice" class="wan-switch-notice"></div>
