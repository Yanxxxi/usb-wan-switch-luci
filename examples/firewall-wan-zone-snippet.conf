# 将 USB 随身 WiFi 接口加入现有 wan 防火墙区域。
# 请把下面的 list network 'usb' 合并到 /etc/config/firewall 中已有的 config zone 'wan' 段落。
#
# 示例：
#
# config zone
# 	option name 'wan'
# 	option input 'REJECT'
# 	option output 'ACCEPT'
# 	option forward 'REJECT'
# 	option masq '1'
# 	option mtu_fix '1'
# 	list network 'wan'
# 	list network 'usb'