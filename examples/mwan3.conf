config globals 'globals'
	option mmx_mask '0x3F00'
	option rtmon_interval '5'

config interface 'wan'
	option enabled '1'
	option family 'ipv4'
	option reliability '1'
	option count '1'
	option timeout '2'
	option interval '5'
	option down '3'
	option up '3'
	list track_ip '223.5.5.5'
	list track_ip '119.29.29.29'
	list track_ip '114.114.114.114'

config interface 'f50'
	option enabled '1'
	option family 'ipv4'
	option reliability '1'
	option count '1'
	option timeout '2'
	option interval '5'
	option down '3'
	option up '3'
	list track_ip '223.5.5.5'
	list track_ip '119.29.29.29'
	list track_ip '114.114.114.114'

config member 'wan_m1_w3'
	option interface 'wan'
	option metric '1'
	option weight '3'

config member 'wan_m2_w1'
	option interface 'wan'
	option metric '2'
	option weight '1'

config member 'f50_m1_w3'
	option interface 'f50'
	option metric '1'
	option weight '3'

config member 'f50_m2_w1'
	option interface 'f50'
	option metric '2'
	option weight '1'

config policy 'campus_first'
	option last_resort 'unreachable'
	list use_member 'wan_m1_w3'
	list use_member 'f50_m2_w1'

config policy 'f50_first'
	option last_resort 'unreachable'
	list use_member 'f50_m1_w3'
	list use_member 'wan_m2_w1'

config rule 'https'
	option sticky '1'
	option dest_port '443'
	option proto 'tcp'
	option use_policy 'campus_first'

config rule 'default_rule'
	option dest_ip '0.0.0.0/0'
	option use_policy 'campus_first'
